<div
  class="sidebar-container"
  [class.light-theme]="theme() === 'light'"
  [class.dark-theme]="theme() === 'dark'">
  <!-- Logo / Title -->
  <div class="sidebar-header">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="logo-icon">
        <path d="M13 2 4 14h6l-1 8 11-14h-6l-1-6z"/>
      </svg>
      <span class="logo-text">VoltAI</span>
    </div>
    <button class="close-btn" (click)="closeSidebar.emit()" title="Close sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- New Chat Button -->
  <button class="new-chat-btn" (click)="newChat()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    New Chat
  </button>

  <!-- Sessions List -->
  <div class="sessions-list">
    <div class="sessions-label">Recent Chats</div>

    @if (sessions().length === 0) {
      <div class="no-sessions">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <p>No conversations yet</p>
        <span>Start a new chat above</span>
      </div>
    }

    @for (session of sessions(); track session.sessionId) {
      <div
        class="session-item"
        [class.active]="activeSessionId() === session.sessionId"
        (click)="selectSession(session)">
        <div class="session-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <div class="session-info">
          <span class="session-title">{{ session.title }}</span>
          <span class="session-date">{{ formatDate(session.createdAt) }}</span>
        </div>
        <button class="delete-btn" (click)="deleteSession($event, session.sessionId)" title="Delete chat">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    }
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="auth-links">
      <a
        class="auth-link"
        routerLink="/login"
        routerLinkActive="active"
        (click)="closeSidebar.emit()">
        Login
      </a>
      <a
        class="auth-link"
        routerLink="/register"
        routerLinkActive="active"
        (click)="closeSidebar.emit()">
        Register
      </a>
    </div>

    <div class="theme-switcher">
      <span class="theme-label">Theme</span>
      <div class="theme-options">
        <button
          class="theme-btn"
          [class.active]="theme() === 'light'"
          (click)="setTheme.emit('light')"
          title="Use light mode">
          Light
        </button>
        <button
          class="theme-btn"
          [class.active]="theme() === 'dark'"
          (click)="setTheme.emit('dark')"
          title="Use dark mode">
          Dark
        </button>
      </div>
    </div>
    <div class="footer-info">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
      <span>Powered by Groq</span>
    </div>
  </div>
</div>
